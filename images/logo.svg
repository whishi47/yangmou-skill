<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15152b"/>
      <stop offset="1" stop-color="#0c0c18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7e08a"/>
      <stop offset="1" stop-color="#c79a2e"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <!-- 暗处旧牌（被替代的阴谋） -->
  <rect x="40" y="44" width="44" height="44" rx="8" fill="#262645" opacity="0.55"/>
  <!-- 明牌：浮起的金色方块 -->
  <rect x="30" y="30" width="50" height="50" rx="10" fill="url(#gold)"/>
  <rect x="30" y="30" width="50" height="50" rx="10" fill="none" stroke="#fff3c4" stroke-width="1.5" opacity="0.7"/>
  <!-- 光束 -->
  <path d="M55 30 L48 8 L62 8 Z" fill="url(#gold)" opacity="0.85"/>
  <circle cx="55" cy="55" r="9" fill="#15152b"/>
  <circle cx="55" cy="55" r="9" fill="none" stroke="#fff3c4" stroke-width="1.5"/>
</svg>
